<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1017"/>
      <stop offset="100%" style="stop-color:#1a1f2e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <!-- Amber accent bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#f59e0b"/>
  
  <!-- Book icon (stylized) -->
  <rect x="100" y="180" width="80" height="360" rx="4" fill="#f59e0b"/>
  <rect x="104" y="184" width="72" height="352" rx="2" fill="#0d1017"/>
  <line x1="115" y1="260" x2="165" y2="260" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
  <line x1="115" y1="290" x2="165" y2="290" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
  <line x1="115" y1="320" x2="165" y2="320" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
  <line x1="115" y1="350" x2="155" y2="350" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <line x1="115" y1="380" x2="160" y2="380" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  
  <!-- Main Title -->
  <text x="220" y="280" font-family="Helvetica, Arial, sans-serif" font-size="62" font-weight="bold" fill="#f59e0b">The Indie Author</text>
  <text x="220" y="360" font-family="Helvetica, Arial, sans-serif" font-size="62" font-weight="bold" fill="#ffffff">LAUNCH KIT</text>
  
  <!-- Subtitle -->
  <text x="222" y="440" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#94a3b8">90-day plan  ·  ARC templates  ·  KDP prompts</text>
  
  <!-- Price badge -->
  <rect x="220" y="480" width="200" height="50" rx="25" fill="#f59e0b"/>
  <text x="260" y="512" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#0d1017">From $29</text>
  
  <!-- Decorative dots -->
  <circle cx="1020" cy="380" r="12" fill="#f59e0b" opacity="0.3"/>
  <circle cx="1080" cy="420" r="10" fill="#f59e0b" opacity="0.2"/>
  <circle cx="1140" cy="360" r="8" fill="#f59e0b" opacity="0.15"/>
  <circle cx="1180" cy="450" r="14" fill="#f59e0b" opacity="0.1"/>
  <circle cx="960" cy="450" r="6" fill="#f59e0b" opacity="0.25"/>
  
  <!-- Tagline -->
  <text x="220" y="580" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#64748b">You wrote the book. Now launch it like you mean it.</text>
</svg>
